   <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
    --bg: #0d0d1a; --card: #181a33; --border: #2a2d52;
    --accent: #e94560; --text: #f0f1f7; --muted: #9499c2;
    --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6;
    }
    html, body {
    height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    }
    .login-card {
    width: 100%; max-width: 380px; padding: 32px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px;
    }
    .login-logo { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 24px; }
    .login-logo .icon {
    width: 48px; height: 48px; background: var(--accent);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    }
    .login-logo h1 { font-size: 1.1rem; font-weight: 700; }
    .login-logo p { font-size: 0.78rem; color: var(--muted); }

    .flash-list { list-style: none; margin-bottom: 16px; }
    .flash-list li { padding: 9px 14px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 6px; }
    .flash-list li.success { background: rgba(34,197,94,0.12); color: var(--success); }
    .flash-list li.danger  { background: rgba(239,68,68,0.12); color: var(--danger); }
    .flash-list li.warning { background: rgba(245,158,11,0.12); color: var(--warning); }
    .flash-list li.info    { background: rgba(59,130,246,0.12); color: var(--info); }

    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
    width: 100%; padding: 10px 14px; margin-bottom: 16px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.88rem; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button[type="submit"] {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: 700;
    cursor: pointer;
    }
    button[type="submit"]:hover { background: #c73652; }
    </style> 
</head>

<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🚔</div>
      <h1>System Monitor</h1>
      <p>불법주차 단속 시스템</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-list">
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" required>

      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">로그인</button>
    </form>
  </div>
</body>
