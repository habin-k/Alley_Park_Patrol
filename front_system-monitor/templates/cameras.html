{% extends "base.html" %}
{% block title %}카메라 - 주차 단속 시스템{% endblock %}
{% block page_title %}실시간 카메라{% endblock %}

{% block content %}
<div class="grid-2">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">📷 Detection 카메라</span>
      <span class="live-dot" style="font-size:0.72rem;">실시간</span>
    </div>
    <div class="panel-body">
      <div class="webcam-wrap" style="min-height:380px;">
        <div class="webcam-overlay" id="overlay1">
          <div class="spinner"></div>
          <span>화면 대기중...</span>
        </div>
        <img src="{{ url_for('video_feed1') }}" alt="Detection 카메라">
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">🤖 AMR 카메라</span>
      <span class="live-dot" style="font-size:0.72rem;">실시간</span>
    </div>
    <div class="panel-body">
      <div class="webcam-wrap" style="min-height:380px;">
        <div class="webcam-overlay" id="overlay2">
          <div class="spinner"></div>
          <span>화면 대기중...</span>
        </div>
        <img src="{{ url_for('video_feed2') }}" alt="AMR 카메라">
      </div>
    </div>
  </div>
</div>
{% endblock %}
