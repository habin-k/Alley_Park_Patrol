{% extends "base.html" %}
{% block title %}장애인 차량 관리 - 주차 단속 시스템{% endblock %}
{% block page_title %}장애인 차량 관리{% endblock %}

{% block content %}
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">♿ 장애인 차량 등록</span>
  </div>
  <div class="panel-body">
    <form method="POST" action="{{ url_for('disabled') }}" style="display:flex; gap:10px; margin-bottom:20px;">
      <input class="form-input" name="plate_number" type="text" placeholder="번호판 입력 (예: 12가3456)" required
             style="flex:1; padding:9px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; outline:none;">
      <button type="submit" style="padding:9px 18px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:0.85rem; font-weight:600; cursor:pointer;">등록</button>
    </form>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>번호판</th><th>등록 일시</th><th>삭제</th></tr>
        </thead>
        <tbody>
          {% for row in data %}
          <tr>
            <td><strong>{{ row.plate_number }}</strong></td>
            <td style="color:var(--muted); font-size:0.85rem;">{{ row.registered_at }}</td>
            <td>
              <form method="POST" action="{{ url_for('disabled_delete', plate_number=row.plate_number) }}" style="display:inline;">
                <button type="submit" style="padding:5px 12px; border:none; border-radius:8px; background:rgba(239,68,68,0.15); color:var(--danger); font-size:0.78rem; font-weight:600; cursor:pointer;">삭제</button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="3" class="empty">등록된 장애인 차량이 없습니다.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
