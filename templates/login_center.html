<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주차 단속 시스템 - 로그인</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 48px 40px;
            width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            color: #e94560;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 8px;
        }
        p.sub {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 32px;
        }
        label { color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 14px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus { border-color: #e94560; }
        button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #c73652; }
        .msg { margin-bottom: 16px; padding: 10px; border-radius: 6px; font-size: 0.85rem; text-align: center; }
        .msg.error { background: #3d1515; color: #ff6b6b; }
        .msg.warning { background: #3d3015; color: #ffd93d; }
    </style>
</head>
<body>
<div class="card">
    <h1>주차 단속 시스템</h1>
    <p class="sub">System Monitor</p>

    {% for message in messages %}
        <div class="msg {% if message.tags == 'error' %}error{% else %}warning{% endif %}">
            {{ message }}
        </div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        <label>아이디</label>
        <input type="text" name="username" placeholder="username" autofocus>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="password">
        <button type="submit">로그인</button>
    </form>
</div>
</body>
</html>
